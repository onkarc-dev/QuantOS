name: QuantOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend import sanity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      ENV: development
      PRISMFLOW_SECRET_KEY: ci-development-secret-key-please-change-in-prod
      EMAIL_OTP_DEV_RETURN: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install psycopg2-binary rq redis

      - name: Import FastAPI app
        run: PYTHONPATH=. python -c "from app.main import app; print(app.title)"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build

  cpp:
    name: C++ build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libwebsockets-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build backtest engine
        run: cmake --build build --target prism_backtest -- -j$(nproc)

      - name: Build live paper engine
        run: cmake --build build --target prism_live_paper_trading -- -j$(nproc)

  docker:
    name: Docker build sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t quantos-api-ci .

      - name: Build web image
        run: docker build -f Dockerfile.web -t quantos-web-ci .
