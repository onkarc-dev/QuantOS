name: QuantOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend import and runtime smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      ENV: development
      PRISMFLOW_SECRET_KEY: ci-development-secret-key-please-change-in-prod
      EMAIL_OTP_DEV_RETURN: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install psycopg2-binary rq redis

      - name: Import FastAPI app
        run: PYTHONPATH=. python -c "from app.main import app; print(app.title)"

      - name: Start API and check health/readiness/metrics
        run: |
          PYTHONPATH=. uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/quantos-api.log 2>&1 &
          API_PID=$!
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/health > /tmp/quantos-health.json; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS http://127.0.0.1:8000/system/readiness
          curl -fsS http://127.0.0.1:8000/metrics | tee /tmp/quantos-metrics.txt
          grep -q "quantos_api_requests_total" /tmp/quantos-metrics.txt
          grep -q "quantos_api_errors_total" /tmp/quantos-metrics.txt
          grep -q "quantos_safe_mode 1" /tmp/quantos-metrics.txt
          kill $API_PID

      - name: Show API logs on failure
        if: failure()
        run: cat /tmp/quantos-api.log || true

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build

  cpp:
    name: C++ build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libwebsockets-dev libssl-dev zlib1g-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build backtest engine
        run: cmake --build build --target prism_backtest -- -j$(nproc)

      - name: Build live paper engine
        run: cmake --build build --target prism_live_paper_trading -- -j$(nproc)

  docker:
    name: Docker build sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t quantos-api-ci .

      - name: Build web image
        run: docker build -f Dockerfile.web -t quantos-web-ci .
